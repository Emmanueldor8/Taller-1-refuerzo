<!-- callbacks.html -->
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Actividad 3: Callbacks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h1 class="mb-4">Callbacks</h1>

      <div class="card p-4 shadow-sm">
        <form id="searchForm">
          <div class="mb-3">
            <input type="text" id="country" class="form-control" placeholder="País" required />
          </div>
          <button class="btn btn-primary">Buscar</button>
        </form>
        <div id="result" class="mt-3 fw-bold"></div>
      </div>
    </div>

    <script>
      const baseDatos1 = ["Canada","EUA","Mexico","Ecuador","Brazil","Argentina","Uruguay"];
      const baseDatos2 = ["Japón","Irán","Corea del Sur","Alemania","Croacia","España","Inglaterra"];

      function encontrado(m){document.getElementById("result").textContent=m;}

      function busquedaBaseDatos2(p,c){
        baseDatos2.includes(p)?c("País encontrado"):document.getElementById("result").textContent="No encontrado";
      }

      function busquedaBaseDatos1(p,c){
        baseDatos1.includes(p)?c("País encontrado"):busquedaBaseDatos2(p,c);
      }

      document.getElementById("searchForm").addEventListener("submit",function(e){
        e.preventDefault();
        const pais=document.getElementById("country").value.trim();
        busquedaBaseDatos1(pais,encontrado);
      });
    </script>
  </body>
</html>
