<!-- async_await.html -->
<!doctype html> 
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Actividad 5: Async/Await</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h1 class="mb-4">Actividad 5: Async/Await</h1>

      <div class="mb-4">
        <h2>Descripción de Async/Await</h2>
        <p>Async/Await simplifica el trabajo con promesas.</p>
      </div>

      <div class="card p-4 shadow-sm">
        <h2>Reto 1</h2>
        <form id="doubleForm">
          <div class="mb-3">
            <label class="form-label">Ingresa un número:</label>
            <input type="number" id="number" class="form-control" required />
          </div>
          <button class="btn btn-primary">Calcular Doble</button>
        </form>
        <div id="result" class="mt-3 fw-bold"></div>
      </div>
    </div>

    <script>
      async function calcularDoble(num) {
        return new Promise((resolve) => {
          setTimeout(() => resolve(num * 2), 2000);
        });
      }

      document.getElementById("doubleForm").addEventListener("submit", async function (e) {
        e.preventDefault();
        const num = parseInt(document.getElementById("number").value);
        document.getElementById("result").textContent = "Calculando...";
        try {
          const doble = await calcularDoble(num);
          document.getElementById("result").textContent = `El doble es: ${doble}`;
        } catch {
          document.getElementById("result").textContent = "Error";
        }
      });
    </script>
  </body>
</html>
