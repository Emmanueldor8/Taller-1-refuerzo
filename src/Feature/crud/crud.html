<!-- crud.html -->
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h1>CRUD LocalStorage</h1>

      <form id="userForm" class="card p-4 mb-4">
        <input type="email" id="email" class="form-control mb-2" placeholder="Email" required>
        <input type="text" id="name" class="form-control mb-2" placeholder="Nombre" required>
        <input type="text" id="document" class="form-control mb-2" placeholder="Documento" required>
        <button class="btn btn-success">Agregar</button>
      </form>

      <div id="errorMessage" class="text-danger"></div>

      <table class="table table-striped">
        <thead><tr><th>Email</th><th>Nombre</th><th>Documento</th><th></th></tr></thead>
        <tbody id="userTable"></tbody>
      </table>
    </div>

    <script>
      const userForm=document.getElementById("userForm");
      const userTable=document.getElementById("userTable");
      const errorMessage=document.getElementById("errorMessage");

      document.addEventListener("DOMContentLoaded",renderUsers);

      userForm.addEventListener("submit",function(e){
        e.preventDefault();
        const email=emailInput.value.trim();
        const name=nameInput.value.trim();
        const documentNum=documentInput.value.trim();
        if(validateUser(email,documentNum)){
          const users=getUsers();
          users.push({email,name,document:documentNum});
          localStorage.setItem("users",JSON.stringify(users));
          renderUsers();
          userForm.reset();
        }
      });

      const emailInput=document.getElementById("email");
      const nameInput=document.getElementById("name");
      const documentInput=document.getElementById("document");

      function validateUser(email,doc){
        const users=getUsers();
        if(users.some(u=>u.email===email)){errorMessage.textContent="Email existe";return false;}
        if(users.some(u=>u.document===doc)){errorMessage.textContent="Doc existe";return false;}
        errorMessage.textContent="";
        return true;
      }

      function getUsers(){return JSON.parse(localStorage.getItem("users"))||[];}

      function renderUsers(){
        userTable.innerHTML="";
        getUsers().forEach((u,i)=>{
          userTable.innerHTML+=`
          <tr>
          <td>${u.email}</td>
          <td>${u.name}</td>
          <td>${u.document}</td>
          <td>
          <button class="btn btn-warning btn-sm" onclick="editUser(${i})">Editar</button>
          <button class="btn btn-danger btn-sm" onclick="deleteUser(${i})">Eliminar</button>
          </td>
          </tr>`;
        });
      }

      function editUser(i){
        const u=getUsers()[i];
        emailInput.value=u.email;
        nameInput.value=u.name;
        documentInput.value=u.document;
        deleteUser(i);
      }

      function deleteUser(i){
        const users=getUsers();
        users.splice(i,1);
        localStorage.setItem("users",JSON.stringify(users));
        renderUsers();
      }
    </script>
  </body>
</html>
