<!-- destructuring.html -->
<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Destructuring</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
<h1>Destructuring</h1>

<div class="card p-4">
<button class="btn btn-success" onclick="extraerPropiedades()">Mostrar</button>
<div id="output" class="mt-3"></div>
</div>
</div>

<script>
const person={name:"Juan",age:30,city:"Cali",profession:"Dev"};
function extraerPropiedades(){
const {name,age,profession}=person;
document.getElementById("output").innerHTML=`${name} - ${age} - ${profession}`;
}
</script>
</body>
</html>
