<!-- promises.html -->
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promises</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h1>Promises</h1>

      <div class="card p-4">
        <form id="vowelForm">
          <input type="text" id="string" class="form-control mb-2" required />
          <button class="btn btn-success">Verificar</button>
        </form>
        <div id="result" class="mt-3"></div>
      </div>
    </div>

    <script>
      function verificarVocal(cadena) {
        return new Promise((res, rej) => {
          const u = cadena.slice(-1).toLowerCase();
          ["a", "e", "i", "o", "u"].includes(u) ? res(u) : rej("No es vocal");
        });
      }

      document
        .getElementById("vowelForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const c = document.getElementById("string").value.trim();
          verificarVocal(c)
            .then((v) => (document.getElementById("result").textContent = v))
            .catch((e) => (document.getElementById("result").textContent = e));
        });
    </script>
  </body>
</html>
